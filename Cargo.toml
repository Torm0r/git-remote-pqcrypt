[package]
name = "git-remote-debug"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "git-remote-debug"
path = "src/main.rs"

[dependencies]

base64 = "0.22"
chacha20poly1305 = { version = "0.10", features =["stream"] }
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha1-checked = "0.10.0"
x-wing = { version = "0.1.0-rc.0", features = ["getrandom", "zeroize"] }
rand_core = "0.10"
